name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build deliverables
    runs-on: ubuntu-latest
    container:
      # Digest-pinned for reproducibility (xu-cheng/texlive-full:latest as of 2026-07-02).
      image: ghcr.io/xu-cheng/texlive-full@sha256:11383430b9a3e48c0b79339f34d8092f942f897d91ab3749d4899d06731fea7f
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install tools
        run: apk add --no-cache make git
      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Lint (ChkTeX)
        run: make check
      - name: Build paper, report, slides
        run: make clean && make all
      - name: Upload PDFs
        uses: actions/upload-artifact@v6
        with:
          name: deliverables
          path: .tmp.nosync/dist/*.pdf

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full@sha256:11383430b9a3e48c0b79339f34d8092f942f897d91ab3749d4899d06731fea7f
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install tools
        run: apk add --no-cache make git
      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build deliverables
        run: make clean && make all
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            .tmp.nosync/dist/paper.pdf
            .tmp.nosync/dist/report.pdf
            .tmp.nosync/dist/presentation.pdf
            .tmp.nosync/dist/handout.pdf
          body: |
            Compiled deliverables for the anti-skid retrofit verification work (VIMS 2026): the IEEE paper, the M.Sc. research report, and the presentation deck. See the README for documentation.

            **Full Changelog**: https://github.com/mtorun0x7cd/anti-skid-verification/commits/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
