<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Filter for glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="var(--accent-teal)" flood-opacity="var(--glow-opacity)"/>
        </filter>
    </defs>

    <style>
        :root {
            --text-title: #0f172a;
            --text-subtitle: #475569;
            --text-badge: #475569;
            --accent-teal: #008080;
            --accent-orange: #d97706;
            --badge-border: #cbd5e1;
            --glow-opacity: 0.05;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-title: #ffffff;
                --text-subtitle: #a0aec0;
                --text-badge: #718096;
                --accent-teal: #00a8a8;
                --accent-orange: #ff8c00;
                --badge-border: #2C3E50;
                --glow-opacity: 0.25;
            }
        }
        .bg-border {
            stroke: var(--accent-teal);
            stroke-opacity: 0.15;
        }
        .teal-stroke {
            stroke: var(--accent-teal);
        }
        .teal-fill {
            fill: var(--accent-teal);
        }
        .orange-stroke {
            stroke: var(--accent-orange);
        }
        .orange-fill {
            fill: var(--accent-orange);
        }
        .text-title {
            fill: var(--text-title);
        }
        .text-subtitle {
            fill: var(--text-subtitle);
        }
        .text-badge-dev {
            fill: var(--text-title);
        }
        .text-badge-gh {
            fill: var(--text-badge);
        }
        .badge-rect-dev {
            fill: var(--accent-teal);
            fill-opacity: 0.12;
            stroke: var(--accent-teal);
            stroke-opacity: 0.3;
        }
        .badge-rect-gh {
            stroke: var(--badge-border);
        }
        .divider {
            stroke: var(--accent-teal);
        }
    </style>

    <!-- Outer border/frame -->
    <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" class="bg-border" stroke-width="2"/>

    <!-- Centered Visual Icon group -->
    <g transform="translate(322, -105.5)" filter="url(#glow)">
        <!-- FPGA Chip frame -->
        <rect x="130" y="215" width="200" height="200" rx="16" fill="none" class="teal-stroke" stroke-width="8" stroke-dasharray="16 8"/>
        <rect x="170" y="255" width="120" height="120" rx="8" fill="var(--accent-teal)" fill-opacity="0.1" class="teal-stroke" stroke-width="4"/>
        
        <!-- Chip pins -->
        <path d="M 130 255 L 110 255 M 130 315 L 110 315 M 130 375 L 110 375
                 M 330 255 L 350 255 M 330 315 L 350 315 M 330 375 L 350 375
                 M 230 215 L 230 195 M 290 215 L 290 195 M 170 215 L 170 195
                 M 230 415 L 230 435 M 290 415 L 290 435 M 170 415 L 170 435" fill="none" class="teal-stroke" stroke-width="6" stroke-linecap="round"/>
                 
        <!-- Speed Deceleration Curve -->
        <path d="M 100 180 Q 220 180 320 380 T 450 400" fill="none" class="orange-stroke" stroke-width="8" stroke-linecap="round"/>
        <circle cx="450" cy="400" r="10" class="orange-fill"/>
    </g>

    <!-- Centered information block (Text) -->
    <g transform="translate(600, 360)">
        <!-- Project Title -->
        <text x="0" y="30" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="1.2" class="text-title" text-anchor="middle">ANTI-SKID VERIFICATION</text>
        
        <!-- Center-aligned Divider line -->
        <line x1="-200" y1="65" x2="200" y2="65" class="divider" stroke-width="3" stroke-linecap="round"/>
        
        <!-- Tagline / Subtitle -->
        <text x="0" y="110" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="500" class="text-subtitle" letter-spacing="0.5" text-anchor="middle">Safety-Critical FPGA Retrofit (IEC 61508 / IEEE 1012)</text>

        <!-- Technical Domain Badge -->
        <g transform="translate(-187.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" class="badge-rect-dev" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-dev" text-anchor="middle" letter-spacing="1">VIMS 2026</text>
        </g>

        <!-- GitHub Handle Badge -->
        <g transform="translate(7.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" fill="none" class="badge-rect-gh" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-gh" text-anchor="middle" letter-spacing="1">@mtorun0x7cd</text>
        </g>
    </g>
</svg>